<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播复盘仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #F5F7FA;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .login-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .login-card {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.5s ease-out;
            position: relative;
            border: 1px solid #E5E7EB;
        }

        .login-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: var(--gray-500);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .login-input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            outline: none;
            transition: all 0.2s ease;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        .login-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .login-button {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .login-button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-error {
            color: var(--danger);
            font-size: 13px;
            margin-top: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .login-error.show {
            opacity: 1;
        }

        :root {
            --primary: #3B82F6;
            --primary-dark: #2563EB;
            --primary-light: #EFF6FF;
            --secondary: #64748B;
            --accent: #F59E0B;
            --success: #10B981;
            --success-bg: #D1FAE5;
            --warning: #F59E0B;
            --warning-bg: #FEF3C7;
            --danger: #EF4444;
            --danger-bg: #FEE2E2;
            --dark: #1E293B;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --white: #FFFFFF;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #F5F7FA;
            min-height: 100vh;
            padding: 24px;
            color: var(--gray-800);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 32px;
            animation: slideDown 0.5s ease-out;
        }

        .header-card {
            background: #FFFFFF;
            border-radius: var(--radius-xl);
            padding: 24px 32px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-200);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--gray-500);
            font-size: 14px;
            font-weight: 400;
        }

        /* Module Cards */
        .module {
            background: #FFFFFF;
            border-radius: var(--radius-xl);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-200);
            animation: fadeInUp 0.5s ease-out;
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .module-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 12px;
            border-left: 3px solid var(--primary);
        }

        .module-title-icon {
            width: 32px;
            height: 32px;
            background: var(--primary-light);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        /* KPI Cards */
        .kpi-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .kpi-card {
            background: #FFFFFF;
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            border: 1px solid var(--gray-200);
            transition: all 0.2s ease;
        }

        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }

        .kpi-label {
            font-size: 13px;
            color: var(--gray-500);
            margin-bottom: 10px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .kpi-icon {
            font-size: 16px;
        }

        .kpi-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--gray-800);
            line-height: 1;
        }

        .kpi-unit {
            font-size: 14px;
            color: var(--gray-500);
            font-weight: 400;
            margin-left: 4px;
        }

        .kpi-definition {
            font-size: 11px;
            color: var(--gray-400);
            margin-top: 6px;
            line-height: 1.4;
        }

        .kpi-trend {
            margin-top: 8px;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
        }

        .kpi-trend.up {
            background: var(--success-bg);
            color: var(--success);
        }
        .funnel-item {
            animation: funnelSlideIn 0.5s ease-out forwards;
            opacity: 0;
            transform: translateX(-20px);
        }

        .funnel-item:nth-child(1) { animation-delay: 0.1s; }
        .funnel-item:nth-child(2) { animation-delay: 0.15s; }
        .funnel-item:nth-child(3) { animation-delay: 0.2s; }
        .funnel-item:nth-child(4) { animation-delay: 0.25s; }
        .funnel-item:nth-child(5) { animation-delay: 0.3s; }

        @keyframes funnelSlideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Review Block Animation */
        .review-block {
            animation: blockFadeIn 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .review-block.highlights { animation-delay: 0.2s; }
        .review-block.issues { animation-delay: 0.3s; }
        .review-block.actions { animation-delay: 0.4s; }

        @keyframes blockFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stat Sparkline */
        .stat-sparkline {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 20px;
            margin-top: 8px;
        }

        .stat-sparkline span {
            flex: 1;
            background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
            border-radius: 2px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .stat-sparkline span:hover {
            opacity: 1;
        }

        /* Improved Tab Hover */
        .session-tab .stats-preview {
            font-size: 11px;
            color: var(--gray-500);
            margin-top: 4px;
            display: flex;
            gap: 8px;
        }

        .session-tab.active .stats-preview {
            color: rgba(255,255,255,0.8);
        }

        /* Gradient Text Animation */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animated-gradient {
            background: linear-gradient(270deg, #667eea, #764ba2, #667eea);
            background-size: 200% 200%;
            animation: gradientShift 3s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .kpi-trend.up {
            background: linear-gradient(135deg, #2ECC71 0%, #27AE60 100%);
            color: white;
        }

        /* Chart Toggle */
        .chart-toggle {
            display: flex;
            gap: 4px;
            background: var(--gray-100);
            padding: 4px;
            border-radius: var(--radius-md);
            border: 1px solid var(--gray-200);
        }

        .toggle-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-600);
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background: #FFFFFF;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .toggle-btn:hover:not(.active) {
            color: var(--gray-700);
            background: var(--gray-200);
        }

        /* Month Selector */
        .month-selector {
            display: flex;
            gap: 4px;
            background: var(--gray-100);
            padding: 4px;
            border-radius: var(--radius-md);
            border: 1px solid var(--gray-200);
        }

        .month-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-600);
            transition: all 0.2s ease;
        }

        .month-btn.active {
            background: #FFFFFF;
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .month-btn:hover:not(.active) {
            color: var(--gray-700);
            background: var(--gray-200);
        }

        /* Filter Toolbar */
        .filter-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            padding: 16px;
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-600);
        }

        .filter-input {
            padding: 8px 12px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 13px;
            background: white;
            min-width: 120px;
        }

        .filter-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .filter-divider {
            width: 1px;
            height: 24px;
            background: var(--gray-200);
            margin: 0 4px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--gray-700);
            cursor: pointer;
            user-select: none;
        }

        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .btn-reset {
            padding: 8px 16px;
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-reset:hover {
            background: var(--gray-100);
            border-color: var(--gray-300);
        }

        /* Compare Panel */
        .compare-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
            border-top: 1px solid var(--gray-200);
            padding: 16px 24px;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .compare-panel.show {
            transform: translateY(0);
        }

        .compare-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .compare-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-800);
        }

        .compare-close {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--gray-400);
            cursor: pointer;
            padding: 4px;
        }

        .compare-close:hover {
            color: var(--gray-600);
        }

        .compare-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .compare-item {
            background: var(--gray-50);
            border-radius: var(--radius-md);
            padding: 12px;
            text-align: center;
        }

        .compare-item-date {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-600);
            margin-bottom: 4px;
        }

        .compare-item-title {
            font-size: 11px;
            color: var(--gray-500);
            margin-bottom: 8px;
        }

        .compare-item-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .compare-item-diff {
            font-size: 11px;
            margin-top: 4px;
        }

        .compare-item-diff.up {
            color: var(--success);
        }

        .compare-item-diff.down {
            color: var(--danger);
        }

        .compare-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }

        .btn-primary {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        /* Session Tab with Checkbox */
        .session-tab-wrapper {
            position: relative;
        }

        .session-tab-checkbox {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 16px;
            height: 16px;
            cursor: pointer;
            z-index: 10;
            accent-color: var(--primary);
        }

        .session-tab.has-checkbox {
            padding-left: 32px;
        }

        /* Chart Container */
        .chart-container {
            position: relative;
            height: 300px;
            background: #FFFFFF;
            border-radius: var(--radius-lg);
            padding: 16px;
            border: 1px solid var(--gray-200);
        }

        /* Session Tabs */
        .session-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--gray-300) transparent;
        }

        .session-tabs::-webkit-scrollbar {
            height: 6px;
        }

        .session-tabs::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 3px;
        }

        .session-tabs::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 3px;
        }

        .session-tab {
            flex-shrink: 0;
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--gray-200);
            background: #FFFFFF;
            position: relative;
            min-width: 130px;
        }

        .session-tab:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--gray-300);
        }

        .session-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .session-tab.active .session-date,
        .session-tab.active .session-title,
        .session-tab.active .stats-preview {
            color: white;
        }

        .session-date {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 4px;
        }

        .session-title {
            font-size: 12px;
            color: var(--gray-500);
            font-weight: 400;
        }

        .highlight-badge {
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 18px;
        }

        .session-tab .stats-preview {
            font-size: 11px;
            color: var(--gray-400);
            margin-top: 6px;
            display: flex;
            gap: 8px;
        }

        /* Detail Container */
        .detail-grid {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Quantitative Section */
        .quantitative-section {
            background: var(--primary);
            border-radius: var(--radius-xl);
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .quantitative-content {
            position: relative;
            z-index: 1;
        }

        .section-title-white {
            font-size: 16px;
            font-weight: 700;
            color: white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .funnel-grid {
            display: grid;
            gap: 10px;
        }

        .funnel-item {
            background: rgba(255, 255, 255, 0.98);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .funnel-item:hover {
            background: white;
            transform: translateX(4px);
        }

        .funnel-label {
            font-size: 13px;
            color: var(--gray-600);
            font-weight: 600;
        }

        .funnel-label-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .metric-def {
            font-size: 11px;
            color: var(--gray-400);
            font-weight: 400;
            background: var(--gray-100);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .funnel-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-800);
            white-space: nowrap;
        }

        /* Qualitative Section */
        .qualitative-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .review-block {
            background: linear-gradient(135deg, #fff 0%, #f8f9ff 100%);
            border-radius: var(--radius-xl);
            padding: 24px;
            border: 1px solid var(--gray-200);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: blockFadeIn 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .review-block.highlights { animation-delay: 0.2s; }
        .review-block.issues { animation-delay: 0.3s; }
        .review-block.actions { animation-delay: 0.4s; }

        .review-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .review-block::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 5px;
        }

        .review-block.highlights::before {
            background: linear-gradient(180deg, #2ECC71 0%, #27AE60 100%);
        }

        .review-block.issues::before {
            background: linear-gradient(180deg, #F39C12 0%, #E67E22 100%);
        }

        .review-block.actions::before {
            background: linear-gradient(180deg, #3498DB 0%, #2980B9 100%);
        }

        .review-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .review-icon-circle {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .review-block.highlights .review-icon-circle {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.15) 0%, rgba(39, 174, 96, 0.15) 100%);
        }

        .review-block.issues .review-icon-circle {
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.15) 0%, rgba(230, 126, 34, 0.15) 100%);
        }

        .review-block.actions .review-icon-circle {
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.15) 0%, rgba(41, 128, 185, 0.15) 100%);
        }

        .review-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--gray-800);
        }

        .review-list {
            list-style: none;
        }

        .review-list li {
            padding: 14px 0 14px 32px;
            position: relative;
            color: var(--gray-700);
            line-height: 1.8;
            font-size: 15px;
            border-bottom: 1px solid var(--gray-100);
            transition: all 0.2s ease;
        }

        .review-list li:hover {
            background: rgba(102, 126, 234, 0.03);
            padding-left: 36px;
        }

        .review-list li:last-child {
            border-bottom: none;
        }

            const errorElement = document.getElementById('loginError');

            if (password === CORRECT_PASSWORD) {
                document.getElementById('loginScreen').classList.add('hidden');
                initApp();
            } else {
                errorElement.classList.add('show');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
                setTimeout(() => {
                    errorElement.classList.remove('show');
                }, 2000);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                handleLogin();
            }
        }

        // Get filtered sessions based on selected month
        function getFilteredSessions() {
            if (currentMonth === 'all') {
                return liveSessions;
            }
            return liveSessions.filter(session => {
                // 优化正则表达式，处理日期中的空格（如"2 月 25 日" 或 "2 月 25 日"）
                const monthMatch = session.date.match(/\s*(\d+)\s*月/);
                return monthMatch && parseInt(monthMatch[1]) === currentMonth;
            });
        }

        // Get available months from data
        function getAvailableMonths() {
            const months = new Set();
            liveSessions.forEach(session => {
                // 优化正则表达式，处理日期中的空格
                const monthMatch = session.date.match(/\s*(\d+)\s*月/);
                if (monthMatch) {
                    months.add(parseInt(monthMatch[1]));
                }
            });
            return Array.from(months).sort((a, b) => a - b);
        }

        function renderMonthSelector() {
            const container = document.getElementById('monthSelector');
            container.innerHTML = '';

            // Add "All" option
            const allBtn = document.createElement('button');
            allBtn.className = `month-btn ${currentMonth === 'all' ? 'active' : ''}`;
            allBtn.textContent = '全部';
            allBtn.onclick = () => selectMonth('all');
            container.appendChild(allBtn);

            // Add month options
            getAvailableMonths().forEach(month => {
                const btn = document.createElement('button');
                btn.className = `month-btn ${currentMonth === month ? 'active' : ''}`;
                btn.textContent = `${month}月`;
                btn.onclick = () => selectMonth(month);
                container.appendChild(btn);
            });
        }

        function selectMonth(month) {
            currentMonth = month;
            renderMonthSelector();
            calculateKPIs();
            renderSessionTabs();
            updateChart();
        }

        function calculateKPIs() {
            const filteredSessions = getFilteredSessions();
            const totalDeals = filteredSessions.reduce((sum, s) => sum + s.chartMetrics.deals, 0);
            const totalViewers = filteredSessions.reduce((sum, s) => sum + s.chartMetrics.viewers, 0);
            const avgConversion = filteredSessions.length > 0
                ? (filteredSessions.reduce((sum, s) => sum + s.chartMetrics.conversion, 0) / filteredSessions.length).toFixed(1)
                : 0;
            const avgDeals = filteredSessions.length > 0
                ? (filteredSessions.reduce((sum, s) => sum + s.chartMetrics.deals, 0) / filteredSessions.length).toFixed(1)
                : 0;
            const avgViewers = filteredSessions.length > 0
                ? (filteredSessions.reduce((sum, s) => sum + s.chartMetrics.viewers, 0) / filteredSessions.length).toFixed(0)
                : 0;
            const maxConversion = filteredSessions.length > 0
                ? Math.max(...filteredSessions.map(s => s.chartMetrics.conversion)).toFixed(1)
                : 0;

            document.getElementById('totalDeals').textContent = totalDeals;
            document.getElementById('totalViewers').textContent = totalViewers;
            document.getElementById('avgConversion').textContent = avgConversion;
            document.getElementById('avgDeals').textContent = avgDeals;
            document.getElementById('avgViewers').textContent = avgViewers;
            document.getElementById('maxConversion').textContent = maxConversion;
        }

        function renderSessionTabs() {
            const container = document.getElementById('sessionTabs');
            container.innerHTML = '';

            const filteredSessions = getFilteredSessions();

            filteredSessions.forEach((session) => {
                const index = liveSessions.indexOf(session);
                const tab = document.createElement('div');
                tab.className = `session-tab ${index === selectedSessionIndex ? 'active' : ''}`;

                tab.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 6px;">
                        <div class="session-date">${session.date}</div>
                        ${session.isHighlight ? '<span class="highlight-badge">🔥</span>' : ''}
                    </div>
                    <div class="session-title">${session.title}</div>
                    <div class="stats-preview">
                        <span style="font-weight: 600;">📦 ${session.chartMetrics.deals}单</span>
                        <span>👁 ${session.chartMetrics.viewers}人</span>
                    </div>
                    <label class="checkbox-label" style="position: absolute; top: 8px; left: 8px; margin: 0;">
                        <input type="checkbox"
                               ${compareSessions.includes(session.id) ? 'checked' : ''}
                               onclick="event.stopPropagation(); toggleCompareSession('${session.id}')">
                    </label>
                `;

                tab.onclick = () => selectSession(index);
                container.appendChild(tab);
            });
        }

        function selectSession(index) {
            selectedSessionIndex = index;
            renderSessionTabs();
            renderDetailContainer(liveSessions[index]);
        }

        function renderDetailContainer(session) {
            const container = document.getElementById('detailContainer');
            container.className = 'module fade-in';

            container.innerHTML = `
                <div class="session-info-header">${session.date} · ${session.title}</div>
                <p class="session-core">${session.coreTheme}</p>
                <div class="detail-grid">
                    <div class="quantitative-section">
                        <div class="quantitative-content">
                            <h3 class="section-title-white">
                                <span style="font-size:22px;">📈</span>
                                数据漏斗
                            </h3>
                            <div class="funnel-grid">
                                <div class="funnel-item">
                                    <div class="funnel-label-row"><span class="funnel-label">🕐 直播时间</span></div>
                                    <span class="funnel-value">${session.detailData.time}</span>
                                </div>
                                <div class="funnel-item">
                                    <span class="funnel-label"><div class="funnel-label-row"><span class="funnel-label">👁 场观人次</span><span class="metric-def">进入直播间总人数</span></div>
                                    <span class="funnel-value">${session.detailData.realUV}</span>
                                </div>
                                <div class="funnel-item">
                                    <div class="funnel-label-row"><span class="funnel-label">🎁 福袋人数</span><span class="metric-def">抢福袋/互动人数</span></div>
                                    <span class="funnel-value">${session.detailData.interaction}</span>
                                </div>
                                <div class="funnel-item">
                                    <div class="funnel-label-row"><span class="funnel-label">📦 成交单数</span><span class="metric-def">进入直播间成交用户量</span></div>
                                    <span class="funnel-value">${session.detailData.revenue}</span>
                                </div>
                                <div class="funnel-item">
                                    <div class="funnel-label-row"><span class="funnel-label">💹 转化率</span><span class="metric-def">成交单数÷福袋人数</span></div>
                                    <span class="funnel-value">${session.detailData.conversion}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="qualitative-section">
                        <div class="review-block highlights">
                            <div class="review-header">
                                <span class="review-icon-circle">✅</span>
                                <span class="review-title">亮点/成功策略</span>
                            </div>
                            ${renderReviewList(session.reviewText.highlights)}
                        </div>

                        <div class="review-block issues">
                            <div class="review-header">
                                <span class="review-icon-circle">⚠️</span>
                                <span class="review-title">不足/问题点</span>
                            </div>
                            ${renderReviewList(session.reviewText.issues)}
                        </div>

                        <div class="review-block actions">
                            <div class="review-header">
                                <span class="review-icon-circle">💡</span>
                                <span class="review-title">迭代/下一步计划</span>
                            </div>
                            ${renderReviewList(session.reviewText.actions)}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderReviewList(items) {
            if (!items || items.length === 0) {
                return '<div class="empty-state">待复盘</div>';
            }

            return `
                <ul class="review-list">
                    ${items.map(item => `<li>${item}</li>`).join('')}
                </ul>
            `;
        }

        function initChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');

            // 创建渐变填充
            const gradient = ctx.createLinearGradient(0, 0, 0, 320);
            gradient.addColorStop(0, 'rgba(59, 130, 246, 0.3)');
            gradient.addColorStop(0.5, 'rgba(59, 130, 246, 0.05)');
            gradient.addColorStop(1, 'rgba(59, 130, 246, 0.01)');

            // 创建线条渐变
            const lineGradient = ctx.createLinearGradient(0, 0, 400, 0);
            lineGradient.addColorStop(0, '#667eea');
            lineGradient.addColorStop(1, '#764ba2');

            const filteredSessions = getFilteredSessions();

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filteredSessions.map(s => s.date),
                    datasets: [{
                        label: '成交单数',
                        data: filteredSessions.map(s => s.chartMetrics.deals),
                        borderColor: lineGradient,
                        backgroundColor: gradient,
                        borderWidth: 4,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 9,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: lineGradient,
                        pointBorderWidth: 4,
                        pointHoverRadius: 12,
                        pointHoverBackgroundColor: lineGradient,
                        pointHoverBorderColor: '#fff',
                        pointHoverBorderWidth: 3,
                        pointShadowColor: 'rgba(102, 126, 234, 0.3)',
                        pointShadowBlur: 8,
                        pointShadowOffsetX: 0,
                        pointShadowOffsetY: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 1500,
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(26, 26, 46, 0.98)',
                            padding: 16,
                            titleFont: { size: 15, weight: 'bold' },
                            bodyFont: { size: 14 },
                            cornerRadius: 12,
                            displayColors: false,
                            titleSpacing: 8,
                            bodySpacing: 8,
                            callbacks: {
                                label: function(context) {
                                    return '数值：' + context.parsed.y;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: '#E5E7EB',
                                drawBorder: false
                            },
                            ticks: {
                                font: { size: 13, weight: '500' },
                                color: '#6C757D',
                                padding: 12,
                                backdropColor: 'transparent'
                            }
                        },
                        x: {
                            grid: {
                                display: false,
                                drawBorder: false
                            },
                            ticks: {
                                font: { size: 13, weight: '600' },
                                color: '#495057',
                                padding: 12
                            }
                        }
                    }
                }
            });

            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentMetric = this.dataset.metric;
                    updateChart();
                });
            });
        }

        function updateChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');

            // 创建渐变填充
            const gradient = ctx.createLinearGradient(0, 0, 0, 320);
            gradient.addColorStop(0, 'rgba(102, 126, 234, 0.5)');
            gradient.addColorStop(0.5, 'rgba(118, 75, 162, 0.2)');
            gradient.addColorStop(1, 'rgba(118, 75, 162, 0.02)');

            // 创建线条渐变
            const lineGradient = ctx.createLinearGradient(0, 0, 400, 0);
            lineGradient.addColorStop(0, '#667eea');
            lineGradient.addColorStop(1, '#764ba2');

            const filteredSessions = getFilteredSessions();
            let label, data;
            switch(currentMetric) {
                case 'deals':
                    label = '成交单数';
                    data = filteredSessions.map(s => s.chartMetrics.deals);
                    break;
                case 'viewers':
                    label = '场观人数';
                    data = filteredSessions.map(s => s.chartMetrics.viewers);
                    break;
                case 'conversion':
                    label = '转化率 (%)';
                    data = filteredSessions.map(s => s.chartMetrics.conversion);
                    break;
            }

            trendChart.data.labels = filteredSessions.map(s => s.date);
            trendChart.data.datasets[0].label = label;
            trendChart.data.datasets[0].data = data;
            trendChart.data.datasets[0].borderColor = lineGradient;
            trendChart.data.datasets[0].backgroundColor = gradient;
            trendChart.update('active');
        }

        // 筛选功能
        let compareSessions = [];

        function resetFilters() {
            document.getElementById('dateStart').value = '';
            document.getElementById('dateEnd').value = '';
            document.getElementById('filterDeals').value = 'all';
            document.getElementById('filterConversion').value = 'all';
            document.getElementById('filterHighlight').checked = false;
            currentMonth = 'all';
            renderMonthSelector();
            calculateKPIs();
            renderSessionTabs();
            updateChart();
        }

        function getFilteredSessions() {
            let result = liveSessions;

            // 月份筛选
            if (currentMonth !== 'all') {
                result = result.filter(session => {
                    const monthMatch = session.date.match(/\s*(\d+)\s*月/);
                    return monthMatch && parseInt(monthMatch[1]) === currentMonth;
                });
            }

            // 日期范围筛选
            const dateStart = document.getElementById('dateStart').value;
            const dateEnd = document.getElementById('dateEnd').value;
            if (dateStart || dateEnd) {
                result = result.filter(session => {
                    const sessionDate = session.id;
                    if (dateStart && sessionDate < dateStart) return false;
                    if (dateEnd && sessionDate > dateEnd) return false;
                    return true;
                });
            }

            // 成交单数筛选
            const dealsFilter = document.getElementById('filterDeals').value;
            if (dealsFilter !== 'all') {
                result = result.filter(session => {
                    const deals = session.chartMetrics.deals;
                    if (dealsFilter === 'gt10') return deals > 10;
                    if (dealsFilter === '5to10') return deals >= 5 && deals <= 10;
                    if (dealsFilter === 'lt5') return deals < 5;
                    return true;
                });
            }

            // 转化率筛选
            const conversionFilter = document.getElementById('filterConversion').value;
            if (conversionFilter !== 'all') {
                result = result.filter(session => {
                    const conversion = session.chartMetrics.conversion;
                    if (conversionFilter === 'gt30') return conversion > 30;
                    if (conversionFilter === '20to30') return conversion >= 20 && conversion <= 30;
                    if (conversionFilter === 'lt20') return conversion < 20;
                    return true;
                });
            }

            // 高光场次筛选
            if (document.getElementById('filterHighlight').checked) {
                result = result.filter(session => session.isHighlight);
            }

            return result;
        }

        // 监听筛选器变化
        document.addEventListener('DOMContentLoaded', function() {
            ['dateStart', 'dateEnd', 'filterDeals', 'filterConversion', 'filterHighlight'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('change', function() {
                        calculateKPIs();
                        renderSessionTabs();
                        updateChart();
                    });
                }
            });
        });

        // 对比功能
        function toggleCompareSession(sessionId) {
            const index = compareSessions.indexOf(sessionId);
            if (index > -1) {
                compareSessions.splice(index, 1);
            } else {
                compareSessions.push(sessionId);
            }
            updateComparePanel();
        }

        function updateComparePanel() {
            const panel = document.getElementById('comparePanel');
            const content = document.getElementById('compareContent');
            const count = document.getElementById('compareCount');

            if (compareSessions.length === 0) {
                panel.classList.remove('show');
                return;
            }

            count.textContent = compareSessions.length;

            const sessions = liveSessions.filter(s => compareSessions.includes(s.id));
            const prevSession = sessions.length > 1 ? sessions[sessions.length - 2] : null;

            content.innerHTML = sessions.map((session, index) => {
                const prevDeals = prevSession ? session.chartMetrics.deals - prevSession.chartMetrics.deals : 0;
                const diffClass = prevDeals >= 0 ? 'up' : 'down';
                const diffText = prevDeals >= 0 ? '+' + prevDeals : prevDeals;

                return `
                    <div class="compare-item">
                        <div class="compare-item-date">${session.date}</div>
                        <div class="compare-item-title">${session.title}</div>
                        <div class="compare-item-value">${session.chartMetrics.deals}单</div>
                        ${index > 0 ? `<div class="compare-item-diff ${diffClass}">${diffText} 较上场</div>` : ''}
                    </div>
                `;
            }).join('');

            panel.classList.add('show');
        }

        function closeComparePanel() {
            compareSessions = [];
            document.getElementById('comparePanel').classList.remove('show');
            renderSessionTabs();
        }

        function showCompareStats() {
            if (compareSessions.length < 2) {
                alert('请至少选择 2 个场次进行对比');
                return;
            }

            const sessions = liveSessions.filter(s => compareSessions.includes(s.id));
            const totalDeals = sessions.reduce((sum, s) => sum + s.chartMetrics.deals, 0);
            const avgConversion = (sessions.reduce((sum, s) => sum + s.chartMetrics.conversion, 0) / sessions.length).toFixed(1);
            const totalViewers = sessions.reduce((sum, s) => sum + s.chartMetrics.viewers, 0);

            alert(`选中 ${sessions.length} 场对比\\n\\n累计成交：${totalDeals} 单\\n平均转化率：${avgConversion}%\\n累计场观：${totalViewers} 人`);
        }
    </script>

    <!-- 对比面板 -->
    <div class="compare-panel" id="comparePanel">
        <div class="compare-header">
            <span class="compare-title">已选择 <span id="compareCount">0</span> 场进行对比</span>
            <button class="compare-close" onclick="closeComparePanel()">×</button>
        </div>
        <div class="compare-grid" id="compareContent">
        </div>
        <div class="compare-actions">
            <button class="btn-primary" onclick="showCompareStats()">查看统计</button>
        </div>
    </div>
</body>
</html>
